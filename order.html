<!DOCTYPE html>
<html>
<head>
<title>Ganga's Kitchen Orders</title>
<style>
body{
    font-family: Arial, sans-serif;
    max-width:700px;
    margin:auto;
    padding:20px;
}
.card{
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
}
button{
    padding:10px 15px;
}
</style>
</head>

<body>

<h1>🍽️ Ganga's Kitchen</h1>

<div class="card">
    <h2>Sunday Combo</h2>
    <p>4 Poori + Channa + 2 Idli + Sambar</p>
    <p><strong>₹169</strong></p>
    <button onclick="addCombo()">Add Sunday Combo</button>
</div>

<div class="card">
    <h2>Build Your Breakfast</h2>

    <p>
        Poori ₹10
        <button onclick="changeQty(-1)">-</button>
        <span id="pooriQty">0</span>
        <button onclick="changeQty(1)">+</button>
    </p>
</div>

<div class="card">
    <h2>Your Order</h2>
    <div id="cart">
        No items yet
    </div>

    <h3 id="total">₹0</h3>
</div>

<script>

let comboCount = 0;
let pooriCount = 0;

function addCombo() {
    comboCount++;
    updateCart();
}

function changeQty(change){

    pooriCount += change;

    if(pooriCount < 0){
        pooriCount = 0;
    }

    document.getElementById("pooriQty").innerText =
        pooriCount;

    updateCart();
}

function updateCart(){

    let total =
        comboCount * 169 +
        pooriCount * 10;

    let html = "";

    if(comboCount > 0){
        html += "Sunday Combo x " + comboCount + "<br>";
    }

    if(pooriCount > 0){
        html += "Poori x " + pooriCount + "<br>";
    }

    if(html === ""){
        html = "No items yet";
    }

    document.getElementById("cart").innerHTML = html;
    document.getElementById("total").innerText =
        "₹" + total;
}

</script>

</body>
</html>
